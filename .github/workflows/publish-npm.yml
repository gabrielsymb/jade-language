name: Publish to npm

on:
  release:
    types: [published]

jobs:
  publish:
    name: Publish packages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          registry-url: 'https://registry.npmjs.org'

      - name: Install & build jade-compiler
        working-directory: jade-compiler
        run: |
          npm ci
          npm run build

      - name: Install & build jade-runtime
        working-directory: jade-runtime
        run: |
          npm ci
          npm run build

      - name: Run tests before publish
        run: |
          cd jade-compiler && npm test
          cd ../jade-runtime && npm test

      - name: Publish jade-compiler
        working-directory: jade-compiler
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish jade-runtime
        working-directory: jade-runtime
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
